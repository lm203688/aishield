name: AIShield CI/CD

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 3 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Run syntax check
      run: |
        python -m py_compile api/server.py eco/*.py scanner/*.py

    - name: Run quick tests
      run: |
        python tests/quick_test.py

    - name: Run all tests
      run: |
        python tests/run_all.py

  security-scan:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Run self-scan (local mode, no network)
      run: |
        python -c "
        import sys
        sys.path.insert(0, '.')
        from scanner.engine import scan
        import json
        result = scan({
            'type': 'mcp_server',
            'name': 'aishield-self-test',
            'description': 'AIShield self scan test',
            'tools': [
                {'name': 'audit', 'description': 'Security audit tool'},
                {'name': 'prompt_check', 'description': 'Prompt injection detection'}
            ]
        })
        print(json.dumps(result, indent=2, ensure_ascii=False))
        score = result.get('score', 0)
        print(f'Self-scan score: {score}')
        if score < 0:
          print('Scan returned negative score')
          exit(1)
        print('Self-scan passed')
        "

  dependency-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check for external dependencies
      run: |
        if [ -f requirements.txt ]; then
          echo "Warning: requirements.txt detected."
          exit 1
        fi
        if grep -rq "^import requests\|^import numpy\|^import pandas\|^import flask\|^import fastapi" --include="*.py" . 2>/dev/null; then
          echo "External dependencies detected in code."
          exit 1
        fi
        echo "Zero-dependency check passed."

  performance-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Benchmark scan performance (local mode)
      run: |
        python -c "
        import time, sys
        sys.path.insert(0, '.')
        from scanner.engine import scan
        start = time.time()
        result = scan({
            'type': 'mcp_server',
            'name': 'perf-test',
            'description': 'Performance benchmark',
            'tools': [
                {'name': 'tool_a', 'description': 'Test tool A'},
                {'name': 'tool_b', 'description': 'Test tool B'}
            ]
        })
        duration = time.time() - start
        print(f'Scan completed in {duration:.2f}s')
        print(f'Overall score: {result.get(\"score\", \"N/A\")}')
        if duration > 5:
          print(f'Warning: Scan took {duration:.2f}s (limit: 5s)')
          exit(1
        )
        print('Performance check passed')
        "

  docker-test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build Docker image
      run: docker build -t aishield:test .

    - name: Run Docker container
      run: |
        docker run -d -p 8450:8450 --name aishield-test aishield:test
        sleep 3

    - name: Health check
      run: |
        curl -sf http://localhost:8450/api/v1/health | python -m json.tool

    - name: Cleanup
      if: always()
      run: |
        docker stop aishield-test 2>/dev/null || true
        docker rm aishield-test 2>/dev/null || true