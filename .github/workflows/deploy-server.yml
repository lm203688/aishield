name: Deploy to Production Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        port: ${{ secrets.SERVER_PORT || 22 }}
        script: |
          cd /opt/aishield || cd ~/aishield
          git pull origin main
          python3 -m py_compile api/server.py eco/*.py scanner/*.py
          pkill -f "api/server.py" || true
          sleep 2
          export PORT=8450
          nohup python3 api/server.py > server.log 2>&1 &
          sleep 3
          curl -sf http://localhost:8450/api/v1/health && echo "Deploy successful"