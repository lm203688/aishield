let currentScenario = 'normal';
let animFrame = null;
let traceProgress = 0;
let tracePath = [];
let highlightedNode = null;
let canvas, ctx;

// ── 初始化 ──
function init() {
  canvas = document.getElementById('chainCanvas');
  ctx = canvas.getContext('2d');
  setupResponsive();
  switchScenario('normal');
  canvas.addEventListener('mousemove', handleMouseMove);
  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('mouseleave', () => { highlightedNode = null; draw(); });
}

function setupResponsive() {
  const container = document.querySelector('.canvas-container');
  const w = Math.min(container.clientWidth - 2, 1100);
  canvas.style.width = w + 'px';
  canvas.style.height = Math.floor(w * 500/1100) + 'px';
}

// ── 场景切换 ──
function switchScenario(name) {
  currentScenario = name;
  document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('.controls button');
  if (name === 'normal') btns[0].classList.add('active');
  else if (name === 'compromised') btns[1].classList.add('active');
  else btns[2].classList.add('active');
  
  traceProgress = 0;
  tracePath = [];
  highlightedNode = null;
  if (animFrame) cancelAnimationFrame(animFrame);
  
  buildTracePath();
  updateDetailPanel();
  traceAnimation();
}

// ── 构建追踪路径 ──
function buildTracePath() {
  const s = scenarios[currentScenario];
  tracePath = [];
  const visited = new Set();
  
  function walk(nodeId) {
    if (visited.has(nodeId)) return;
    visited.add(nodeId);
    const node = s.nodes.find(n => n.id === nodeId);
    if (node) tracePath.push(node);
    const children = s.edges.filter(e => e.from === nodeId);
    children.forEach(e => walk(e.to));
  }
  
  walk('user');
}

// ── 追踪动画 ──
function traceAnimation() {
  traceProgress = 0;
  if (animFrame) cancelAnimationFrame(animFrame);
  animate();
}

function animate() {
  traceProgress += 0.008;
  if (traceProgress > 1.05) {
    traceProgress = 1.05;
    draw();
    return;
  }
  draw();
  animFrame = requestAnimationFrame(animate);
}

// ── 绘制 ──
function draw() {
  const s = scenarios[currentScenario];
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  const cw = canvas.width;
  const ch = canvas.height;
  
  // 背景网格
  ctx.strokeStyle = 'rgba(30,41,59,0.5)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < cw; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ch); ctx.stroke();
  }
  for (let y = 0; y < ch; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(cw, y); ctx.stroke();
  }
  
  // 缩放因子
  const scaleX = cw / 1100;
  const scaleY = ch / 500;
  
  // 绘制边
  s.edges.forEach(edge => {
    const fromNode = s.nodes.find(n => n.id === edge.from);
    const toNode = s.nodes.find(n => n.id === edge.to);
    if (!fromNode || !toNode) return;
    
    const fx = fromNode.x * scaleX, fy = fromNode.y * scaleY;
    const tx = toNode.x * scaleX, ty = toNode.y * scaleY;
    
    const edgeIdx = s.edges.indexOf(edge);
    const edgeProgress = Math.max(0, Math.min(1, (traceProgress * s.edges.length) - edgeIdx));
    
    // 边线
    ctx.beginPath();
    ctx.moveTo(fx, fy);
    ctx.lineTo(tx, ty);
    
    if (edge.tampered) {
      ctx.strokeStyle = 'rgba(239,68,68,0.3)';
      ctx.lineWidth = 2;
      ctx.setLineDash([8, 4]);
    } else {
      ctx.strokeStyle = 'rgba(30,41,59,0.8)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([]);
    }
    ctx.stroke();
    ctx.setLineDash([]);
    
    // 追踪动画的发光边
    if (edgeProgress > 0 && edgeProgress < 1) {
      const glowX = fx + (tx - fx) * edgeProgress;
      const glowY = fy + (ty - fy) * edgeProgress;
      
      const gradient = ctx.createLinearGradient(fx, fy, tx, ty);
      const stopPos = edgeProgress;
      gradient.addColorStop(0, 'rgba(6,182,212,0)');
      gradient.addColorStop(stopPos - 0.05, 'rgba(6,182,212,0.6)');
      gradient.addColorStop(stopPos, 'rgba(6,182,212,1)');
      gradient.addColorStop(stopPos + 0.05, 'rgba(6,182,212,0.6)');
      gradient.addColorStop(1, 'rgba(6,182,212,0)');
      
      ctx.beginPath();
      ctx.moveTo(fx, fy);
      ctx.lineTo(tx, ty);
      ctx.strokeStyle = gradient;
      ctx.lineWidth = 3;
      ctx.stroke();
      
      // 追踪点
      ctx.beginPath();
      ctx.arc(glowX, glowY, 5, 0, Math.PI * 2);
      ctx.fillStyle = '#06b6d4';
      ctx.shadowColor = '#06b6d4';
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    // 意图标签
    if (edgeProgress > 0.3) {
      const mx = (fx + tx) / 2, my = (fy + ty) / 2 - 15;
      ctx.font = `${10 * scaleY}px "Segoe UI","PingFang SC",sans-serif`;
      ctx.fillStyle = edge.tampered ? 'rgba(239,68,68,0.8)' : 'rgba(100,116,139,0.8)';
      ctx.textAlign = 'center';
      ctx.fillText(edge.intent.substring(0, 12), mx, my);
    }
  });
  
  // 绘制节点
  s.nodes.forEach(node => {
    const nx = node.x * scaleX, ny = node.y * scaleY;
    const radius = node.type === 'user' ? 22 * scaleY : node.type === 'tool' ? 18 * scaleY : 24 * scaleY;
    
    // 节点是否在追踪路径中已到达
    const nodeIdx = tracePath.findIndex(n => n.id === node.id);
    const nodeReached = nodeIdx >= 0 && nodeIdx / tracePath.length <= traceProgress;
    
    // 光晕
    if (highlightedNode === node.id) {
      ctx.beginPath();
      ctx.arc(nx, ny, radius + 8, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(6,182,212,0.1)';
      ctx.fill();
    }
    
    // 节点圆
    const gradient = ctx.createRadialGradient(nx - 3, ny - 3, 0, nx, ny, radius);
    if (node.tampered) {
      gradient.addColorStop(0, '#f87171');
      gradient.addColorStop(1, '#991b1b');
    } else if (nodeReached) {
      gradient.addColorStop(0, '#60a5fa');
      gradient.addColorStop(1, '#1d4ed8');
    } else {
      gradient.addColorStop(0, '#334155');
      gradient.addColorStop(1, '#1e293b');
    }
    
    ctx.beginPath();
    ctx.arc(nx, ny, radius, 0, Math.PI * 2);
    ctx.fillStyle = gradient;
    ctx.fill();
    
    // 边框
    ctx.strokeStyle = node.tampered ? '#ef4444' : nodeReached ? '#60a5fa' : '#334155';
    ctx.lineWidth = 2;
    ctx.stroke();
    
    // 信任分圆圈
    if (node.trust !== undefined) {
      const scoreRadius = radius + 6;
      const scoreAngle = (node.trust / 100) * Math.PI * 2;
      ctx.beginPath();
      ctx.arc(nx, ny, scoreRadius, -Math.PI / 2, -Math.PI / 2 + scoreAngle);
      ctx.strokeStyle = node.trust >= 80 ? '#22c55e' : node.trust >= 60 ? '#f59e0b' : '#ef4444';
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
    
    // 节点标签
    ctx.font = `bold ${11 * scaleY}px "Segoe UI","PingFang SC",sans-serif`;
    ctx.fillStyle = '#e2e8f0';
    ctx.textAlign = 'center';
    ctx.fillText(node.label, nx, ny + radius + 18);
    
    // 信任分数字
    if (node.trust !== undefined) {
      ctx.font = `${9 * scaleY}px "Segoe UI","PingFang SC",sans-serif`;
      ctx.fillStyle = node.trust >= 80 ? '#22c55e' : node.trust >= 60 ? '#f59e0b' : '#ef4444';
      ctx.fillText(node.trust, nx, ny + radius + 32);
    }
    
    // 篡改标记
    if (node.tampered) {
      ctx.font = `${14 * scaleY}px "Segoe UI","PingFang SC",sans-serif`;
      ctx.fillStyle = '#ef4444';
      ctx.fillText('⚠', nx, ny - radius - 8);
    }
  });
  
  // 标题
  ctx.font = `bold ${13 * scaleY}px "Segoe UI","PingFang SC",sans-serif`;
  ctx.fillStyle = 'rgba(100,116,139,0.6)';
  ctx.textAlign = 'left';
  ctx.fillText('Trippy-style 委托链追踪', 10, 20);
}

// ── 鼠标交互 ──
function handleMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (1100 / rect.width);
  const my = (e.clientY - rect.top) * (500 / rect.height);
  
  const s = scenarios[currentScenario];
  let found = null;
  for (const node of s.nodes) {
    const dist = Math.sqrt((node.x - mx) ** 2 + (node.y - my) ** 2);
    if (dist < 30) { found = node.id; break; }
  }
  
  if (found !== highlightedNode) {
    highlightedNode = found;
    draw();
    canvas.style.cursor = found ? 'pointer' : 'default';
  }
}

function handleClick(e) {
  if (highlightedNode) {
    const s = scenarios[currentScenario];
    const node = s.nodes.find(n => n.id === highlightedNode);
    if (node) {
      highlightDetailCard(node.id);
    }
  }
}

// ── 详情面板 ──
function updateDetailPanel() {
  const s = scenarios[currentScenario];
  const panel = document.getElementById('detailPanel');
  let html = '';
  
  s.nodes.forEach(node => {
    const cls = node.tampered ? 'risk' : '';
    const dotColor = node.tampered ? 'var(--red)' : node.trust >= 80 ? 'var(--green)' : node.trust >= 60 ? 'var(--amber)' : 'var(--red)';
    html += `
      <div class="detail-card ${cls}" id="detail-${node.id}" onclick="highlightDetailCard('${node.id}')">
        <div class="node-name">
          <span class="dot" style="background:${dotColor}"></span>
          ${node.label}
          ${node.tampered ? '<span style="color:var(--red);font-size:0.7rem;">⚠ 风险</span>' : ''}
        </div>
        <div class="metric"><span class="label">类型</span><span class="value">${node.type === 'user' ? '用户' : node.type === 'agent' ? 'Agent' : '工具'}</span></div>
        <div class="metric"><span class="label">信任分</span><span class="value ${node.trust >= 80 ? 'good' : node.trust >= 60 ? 'warn' : 'bad'}">${node.trust}/100</span></div>
        <div class="metric"><span class="label">说明</span><span class="value" style="font-size:0.75rem;">${node.desc}</span></div>
      </div>`;
  });
  
  panel.innerHTML = html;
}

function highlightDetailCard(nodeId) {
  document.querySelectorAll('.detail-card').forEach(c => c.classList.remove('highlight'));
  const card = document.getElementById('detail-' + nodeId);
  if (card) {
    card.classList.add('highlight');
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
}

// ── 信任评分更新 ──
function updateTrustScore() {
  const s = scenarios[currentScenario];
  const badge = document.getElementById('trustScore');
  badge.textContent = s.overallScore + ' / 100';
  badge.className = 'trust-badge ' + s.riskLevel;
}

// 重写场景切换以包含评分更新
const origSwitchScenario = switchScenario;
switchScenario = function(name) {
  origSwitchScenario(name);
  updateTrustScore();
};

// ── 启动 ──
window.addEventListener('load', init);
window.addEventListener('resize', () => { setupResponsive(); draw(); });
</script>

</body>
</html>
