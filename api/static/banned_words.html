    </svg>
    <h1 class="text-4xl font-bold text-white">AIShield</h1>

<!-- Main Card -->
<main class="max-w-3xl mx-auto px-4 pb-16">
  <div class="bg-slate-800/60 backdrop-blur rounded-2xl p-8 shield-glow border border-slate-700/50">
    
    <!-- Platform Select -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-300 mb-2">目标平台</label>
      <div class="flex flex-wrap gap-2">
        <button onclick="setPlatform('all')" class="platform-btn active px-4 py-2 rounded-lg text-sm font-medium bg-sky-600 text-white" data-platform="all">全部平台</button>
        <button onclick="setPlatform('wechat')" class="platform-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-gray-300 hover:bg-slate-600" data-platform="wechat">微信</button>
        <button onclick="setPlatform('douyin')" class="platform-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-gray-300 hover:bg-slate-600" data-platform="douyin">抖音</button>
        <button onclick="setPlatform('xiaohongshu')" class="platform-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-gray-300 hover:bg-slate-600" data-platform="xiaohongshu">小红书</button>
        <button onclick="setPlatform('bilibili')" class="platform-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-gray-300 hover:bg-slate-600" data-platform="bilibili">B站</button>
        <button onclick="setPlatform('weibo')" class="platform-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-gray-300 hover:bg-slate-600" data-platform="weibo">微博</button>
      </div>
    </div>

    <!-- Text Input -->
    <div class="mb-6">
      <label class="block text-sm font-medium text-gray-300 mb-2">待检测文本</label>
      <textarea id="inputText" rows="6" class="w-full bg-slate-900/50 border border-slate-600 rounded-xl p-4 text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-sky-500 focus:border-transparent resize-none" placeholder="在此输入要检测的中文文本内容..."></textarea>
    </div>

    <!-- Submit -->
    <button onclick="checkText()" id="checkBtn" class="w-full py-3 px-6 bg-sky-600 hover:bg-sky-500 text-white font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">
      <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg>

<script>
let selectedPlatform = 'all';

function setPlatform(p) {
  selectedPlatform = p;
  document.querySelectorAll('.platform-btn').forEach(btn => {
    if (btn.dataset.platform === p) {
      btn.className = 'platform-btn active px-4 py-2 rounded-lg text-sm font-medium bg-sky-600 text-white';
    } else {
      btn.className = 'platform-btn px-4 py-2 rounded-lg text-sm font-medium bg-slate-700 text-gray-300 hover:bg-slate-600';
    }
  });
}

async function checkText() {
  const text = document.getElementById('inputText').value.trim();
  if (!text) { alert('请输入待检测文本'); return; }
  
  const btn = document.getElementById('checkBtn');
  const results = document.getElementById('results');
  btn.disabled = true;
  btn.textContent = '检测中...';
  results.classList.add('hidden');
  
  try {
    const resp = await fetch('/api/v1/banned-words', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text, platform: selectedPlatform })
    });
    const data = await resp.json();
    renderResults(data);
  } catch (e) {
    // 如果API不可用，做客户端检测
    renderClientResults(text);
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<svg class="w-5 h-5 inline" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 105.196 5.196a7.5 7.5 0 0010.607 10.607z" /></svg> 开始检测';
  }
}

function renderResults(data) {
  const results = document.getElementById('results');
  results.classList.remove('hidden');
  
  if (data.safe) {
    results.innerHTML = `
      <div class="bg-emerald-900/30 border border-emerald-700/50 rounded-xl p-6 text-center">
        <div class="text-3xl mb-2">✅</div>
        <div class="text-emerald-400 font-semibold text-lg">未检测到违禁词</div>
        <div class="text-gray-400 text-sm mt-1">在${data.platform === 'all' ? '所有平台' : data.platform}规则下，该文本合规</div>
      </div>`;
  } else {
    let wordsHtml = data.words.map(w => `
      <div class="result-card bg-slate-900/50 border border-slate-700 rounded-lg p-4">
        <div class="flex items-center justify-between">
          <span class="text-red-400 font-mono font-bold text-lg">${w.word}</span>
          <span class="px-2 py-1 rounded text-xs font-medium ${w.severity === 'high' ? 'bg-red-900/50 text-red-300' : 'bg-yellow-900/50 text-yellow-300'}">${w.severity}</span>
        </div>
        <div class="text-gray-400 text-sm mt-2">上下文: <span class="text-gray-300">...${w.context}...</span></div>
      </div>`).join('');
    
    results.innerHTML = `
      <div class="bg-red-900/20 border border-red-700/50 rounded-xl p-4 mb-4">
        <div class="text-red-400 font-semibold">⚠️ 检测到 ${data.found_count} 个违禁词/敏感词</div>
      </div>
      ${wordsHtml}`;
  }
}

// 客户端备用检测（API不可用时）
function renderClientResults(text) {
  const words = ['赌博','色情','暴力','恐怖','毒品','枪支','洗钱','诈骗','传销','非法集资','反动','颠覆','邪教'];
  const found = words.filter(w => text.includes(w));
  const results = document.getElementById('results');
  results.classList.remove('hidden');
  
  if (found.length === 0) {
    renderResults({safe: true, platform: selectedPlatform});
  } else {
    renderResults({
      safe: false, found_count: found.length, platform: selectedPlatform,
      words: found.map(w => ({
        word: w, severity: 'high',
        context: text.substring(Math.max(0, text.indexOf(w)-10), text.indexOf(w)+w.length+10)
      }))
    });
  }
}
</script>

</body>
